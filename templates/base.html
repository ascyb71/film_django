{% load static %}
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>
       {% block titre %}Gestion des films{% endblock titre %}
    </title>

    <style>
        /* Keep footer at the bottom of the screen */
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        
        /* Logo hover animation */
        .navbar-brand img { transition: transform 0.3s ease; }
        .navbar-brand:hover img { transform: scale(1.05); }
        
        /* Modern connected search bar */
        .search-input { border-radius: 20px 0 0 20px; border-right: none; }
        .search-input:focus { box-shadow: none; border-color: #0d6efd; }
        .search-btn { border-radius: 0 20px 20px 0; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{% static 'images/Gemini_Generated_Image_wse75cwse75cwse7.png' %}" 
                     alt="Logo" 
                     style="height: 50px; width: auto; object-fit: contain; margin-right: 12px; border-radius: 6px;">
                <span class="h4 mb-0 text-dark" style="font-weight: 700; letter-spacing: -0.5px;">Films Spéciaux</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-primary" aria-current="page" href="/films/">🎬 Nos Films</a>
                    </li>
                </ul>

                <form class="d-flex" action="/films/" method="GET">
                    <input class="form-control search-input border-primary" type="search" placeholder="Rechercher un film..." name="search" aria-label="Search">
                    <button class="btn btn-primary search-btn px-4 fw-bold" type="submit">Chercher</button>
                </form>

            </div>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="bg-white border-top text-center text-muted py-4 mt-auto shadow-sm">
        <div class="container">
            <p class="mb-0">© 2026 Films Spéciaux. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
